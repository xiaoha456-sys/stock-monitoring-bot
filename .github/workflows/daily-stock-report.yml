name: Daily stock report

on:
  schedule:
    # 悉尼时间周一至周五 09:00（不含周六日）
    - cron: "0 9 * * 1-5"
      timezone: "Australia/Sydney"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-stock-report
  cancel-in-progress: false

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Check weekly review day (Saturday)
        id: weekly
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_review=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DOW=$(TZ=Australia/Sydney date +%u)
          if [ "$DOW" = "6" ]; then
            echo "run_review=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_review=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Review past predictions (weekly T+5)
        if: steps.weekly.outputs.run_review == 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python stock_bot.py --review

      - name: Iterate accuracy tuning (weekly)
        if: steps.weekly.outputs.run_review == 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python stock_bot.py --iterate

      - name: Generate and send market reports
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python stock_bot.py
